<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D3A4A"/>
      <stop offset="100%" stop-color="#0A7EA4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" fill="url(#bg)"/>

  <!-- Hair (dark) -->
  <rect x="32" y="16" width="64" height="8" fill="#1A1A2E"/>
  <rect x="24" y="24" width="8" height="16" fill="#1A1A2E"/>
  <rect x="96" y="24" width="8" height="16" fill="#1A1A2E"/>
  <rect x="32" y="24" width="64" height="8" fill="#1A1A2E"/>
  <rect x="24" y="40" width="8" height="8" fill="#1A1A2E"/>

  <!-- Face -->
  <rect x="32" y="32" width="64" height="48" fill="#E8B89D"/>
  <rect x="24" y="40" width="8" height="32" fill="#E8B89D"/>
  <rect x="96" y="40" width="8" height="32" fill="#E8B89D"/>

  <!-- Eyes -->
  <rect x="40" y="48" width="8" height="8" fill="#FFFFFF"/>
  <rect x="80" y="48" width="8" height="8" fill="#FFFFFF"/>
  <rect x="44" y="48" width="4" height="4" fill="#1A1A2E"/>
  <rect x="84" y="48" width="4" height="4" fill="#1A1A2E"/>

  <!-- Eyebrows -->
  <rect x="40" y="44" width="8" height="4" fill="#1A1A2E"/>
  <rect x="80" y="44" width="8" height="4" fill="#1A1A2E"/>

  <!-- Nose -->
  <rect x="60" y="56" width="8" height="4" fill="#D4A088"/>

  <!-- Mouth -->
  <rect x="52" y="68" width="24" height="4" fill="#C4877A"/>
  <rect x="56" y="72" width="16" height="4" fill="#FFFFFF"/>

  <!-- Neck -->
  <rect x="52" y="80" width="24" height="8" fill="#E8B89D"/>

  <!-- Shirt (Bondi Blue) -->
  <rect x="32" y="88" width="64" height="40" fill="#0A7EA4"/>
  <rect x="24" y="88" width="8" height="24" fill="#0A7EA4"/>
  <rect x="96" y="88" width="8" height="24" fill="#0A7EA4"/>
  <rect x="16" y="96" width="8" height="16" fill="#0A7EA4"/>
  <rect x="104" y="96" width="8" height="16" fill="#0A7EA4"/>
  <rect x="8" y="104" width="8" height="16" fill="#0A7EA4"/>
  <rect x="112" y="104" width="8" height="16" fill="#0A7EA4"/>

  <!-- Shirt collar -->
  <rect x="52" y="88" width="8" height="8" fill="#086A8A"/>
  <rect x="68" y="88" width="8" height="8" fill="#086A8A"/>

  <!-- Pixel highlight on face -->
  <rect x="36" y="36" width="4" height="4" fill="#F0C8B0" opacity="0.6"/>

  <!-- Glasses frames -->
  <rect x="36" y="44" width="16" height="16" fill="none" stroke="#1A1A2E" stroke-width="2"/>
  <rect x="76" y="44" width="16" height="16" fill="none" stroke="#1A1A2E" stroke-width="2"/>
  <rect x="52" y="50" width="24" height="2" fill="#1A1A2E"/>
</svg>
